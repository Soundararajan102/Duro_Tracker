name: Build Android Release AAB

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: "http://10.0.2.2:8000/api/v1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Python (for icon generation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Expo Prebuild
        working-directory: ./frontend
        run: npx expo prebuild --platform android --clean

      - name: Build Release AAB with Gradle
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Duro-Tracker-Release-AAB
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
